# Minimal config used only by .github/workflows/smoke-action.yml
# to verify the composite action wrapper. Not consumed at runtime.
provider:
  type: github
  url: https://github.com

tagFormat: "v{version}"

categories:
  feature: "New Features"
  bug: "Bug Fixes"
  improvement: "Improvements"
  breaking-change: "Breaking Changes"

uncategorized: lenient

template: default
