name: Smoke test Action
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "action.yml"
      - ".github/workflows/smoke-action.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Test action with dry-run (no publish)
        uses: ./
        with:
          tag: v1.9.4
          publish: "false"
          token: ${{ secrets.GITHUB_TOKEN }}
